function useReveal() {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setSeen(true); obs.disconnect(); } },
      { threshold: 0.12 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, seen];
}

// ============================================================
function App() {
  const [activeSeries, setActiveSeries] = useState("ALL");
  const [activeLevel,  setActiveLevel]  = useState("ALL");
  const [search, setSearch]   = useState("");
  const [playing, setPlaying] = useState(null);
  const [showPath, setShowPath] = useState(false);

  const filtered = useMemo(() => {
    return VIDEOS.filter((v) => {
      if (activeSeries !== "ALL" && v.series !== activeSeries) return false;
      if (activeLevel  !== "ALL" && v.level  !== activeLevel)  return false;
      if (search.trim()) {
        const q = search.toLowerCase();
        const series = SERIES[v.series];
        if (!v.title.toLowerCase().includes(q) &&
            !series.teacher.toLowerCase().includes(q) &&
            !series.title.toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [activeSeries, activeLevel, search]);

  const [heroRef,   heroSeen]   = useReveal();
  const [pathRef,   pathSeen]   = useReveal();
  const [seriesRef, seriesSeen] = useReveal();
  const [filterRef, filterSeen] = useReveal();
  const [ctaRef,    ctaSeen]    = useReveal();

  return (
    <div className="min-h-screen bg-[#fbf7f1] text-stone-900">

      {/* ============ STICKY HEADER ============ */}
      <header className="sticky top-0 z-40 bg-[#fbf7f1]/85 backdrop-blur-md border-b border-stone-200/60">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
          <a href="/" className="flex items-center gap-2.5 group">
            <div className="w-9 h-9 rounded-full bg-[#c2410c] text-white flex items-center justify-center font-serif text-lg font-semibold group-hover:scale-105 transition">U</div>
            <div className="leading-tight">
              <div className="font-serif text-[15px] font-semibold text-stone-900">Ukulele Malaysia</div>
              <div className="text-[10px] tracking-[0.2em] text-stone-500 uppercase">Learning Center</div>
            </div>
          </a>
          <div className="hidden sm:flex items-center gap-1 bg-stone-100 p-1 rounded-full text-xs">
            <button className="px-3 py-1 rounded-full text-stone-400 hover:text-stone-600 transition">EN</button>
            <button className="px-3 py-1 rounded-full text-stone-400 hover:text-stone-600 transition">BM</button>
            <button className="px-3 py-1 rounded-full bg-white shadow-sm text-stone-900 font-medium">中文</button>
          </div>
        </div>
      </header>

      <main id="top">

        {/* ============ HERO ============ */}
        <section ref={heroRef} className={`relative grain overflow-hidden reveal ${heroSeen ? "reveal-on" : ""}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 pt-12 sm:pt-20 pb-16 sm:pb-24 relative">
            <div className="text-[11px] tracking-[0.3em] text-[#c2410c] font-medium uppercase mb-5">
              · 01 / Free Learning Hub ·
            </div>
            <h1 className="font-serif text-[44px] sm:text-[72px] leading-[0.95] font-medium text-stone-900 max-w-4xl">
              从零开始，<br/>
              <span className="italic text-[#c2410c]">免费</span> 学会尤克里里。
            </h1>
            <p className="mt-6 text-stone-600 max-w-2xl text-base sm:text-lg leading-relaxed">
              我们为你精选了 <strong className="text-stone-900">44 个</strong> 来自 <strong className="text-stone-900">4 位</strong> 优质讲师的免费视频教程，
              从握姿、调音到指弹曲，每一步都有人带你走。点开任何一支就能学，不用注册、不用付费。
            </p>

            <div className="mt-8 flex flex-wrap items-center gap-3">
              <button onClick={() => setShowPath(true)}
                      className="inline-flex items-center gap-2 bg-[#c2410c] hover:bg-[#9a3208] text-white px-6 py-3 rounded-full text-sm font-medium transition shadow-md hover:shadow-lg">
                <IconSparkles size={16} /> 我是新手，从哪开始？
              </button>
              <a href="#library"
                 className="inline-flex items-center gap-2 bg-white hover:bg-stone-50 text-stone-900 border border-stone-300 px-6 py-3 rounded-full text-sm font-medium transition">
                浏览全部课程 <IconChevron size={16} />
              </a>
            </div>

            <div className="mt-12 sm:mt-16 grid grid-cols-2 sm:grid-cols-4 gap-4 sm:gap-6 max-w-3xl">
              {[
                { n: "44", l: "免费视频" },
                { n: "4",  l: "优质讲师" },
                { n: "5",  l: "难度层级" },
                { n: "0",  l: "需要付费", sub: "RM" }
              ].map((s, i) => (
                <div key={i} className="border-l-2 border-[#c2410c]/20 pl-4">
                  <div className="font-serif text-3xl sm:text-4xl font-medium text-stone-900">
                    {s.sub && <span className="text-base text-stone-400 mr-0.5">{s.sub}</span>}
                    {s.n}
                  </div>
                  <div className="text-[11px] tracking-wider uppercase text-stone-500 mt-1">{s.l}</div>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* ============ 推荐路径 ============ */}
        {showPath && (
          <section ref={pathRef} className={`bg-stone-900 text-stone-100 reveal ${pathSeen ? "reveal-on" : ""}`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 py-12 sm:py-16 relative">
              <button onClick={() => setShowPath(false)}
                      aria-label="关闭推荐路径"
                      className="absolute top-4 right-4 sm:top-6 sm:right-6 w-8 h-8 rounded-full bg-stone-800 hover:bg-stone-700 flex items-center justify-center transition">
                <IconX size={16} />
              </button>
              <div className="text-[11px] tracking-[0.3em] text-[#c2410c] font-medium uppercase mb-3">
                · 02 / Recommended Path ·
              </div>
              <h2 className="font-serif text-3xl sm:text-5xl font-medium mb-4">9 步走，弹会第一首歌</h2>
              <p className="text-stone-400 max-w-2xl mb-10 text-sm sm:text-base">
                如果你完全没碰过尤克里里，按这个顺序看，大约 1-2 周就能弹完整的《新年好》。
              </p>
              <ol className="space-y-3">
                {PATH.map((step, i) => {
                  const v = VIDEOS.find((x) => x.id === step.videoId);
                  if (!v) return null;
                  const series = SERIES[v.series];
                  return (
                    <li key={i}>
                      <button onClick={() => setPlaying(v)}
                              className="w-full flex items-start gap-4 sm:gap-5 p-4 sm:p-5 bg-stone-800/60 hover:bg-stone-800 rounded-xl transition text-left group">
                        <div className="font-serif text-3xl sm:text-4xl text-[#c2410c] font-medium leading-none w-10 sm:w-12 shrink-0">
                          {String(i + 1).padStart(2, "0")}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="font-serif text-base sm:text-lg text-white group-hover:text-[#c2410c] transition">{v.title}</div>
                          <div className="text-xs sm:text-sm text-stone-400 mt-1">{step.note}</div>
                          <div className="text-[11px] text-stone-500 mt-2 font-mono">
                            {series.code}-{v.num} · {series.teacher} · {v.duration}
                          </div>
                        </div>
                        <IconPlay size={20} className="text-stone-500 group-hover:text-[#c2410c] transition shrink-0 mt-2" />
                      </button>
                    </li>
                  );
                })}
              </ol>
            </div>
          </section>
        )}

        {/* ============ 系列介绍 ============ */}
        <section ref={seriesRef} className={`reveal ${seriesSeen ? "reveal-on" : ""}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
            <div className="text-[11px] tracking-[0.3em] text-[#c2410c] font-medium uppercase mb-3">
              · 0{showPath ? 3 : 2} / Course Series ·
            </div>
            <h2 className="font-serif text-3xl sm:text-5xl font-medium mb-12 max-w-3xl">
              四位讲师，四种风格，<br/>
              <span className="italic text-stone-500">总有一种适合你。</span>
            </h2>
            <div className="grid sm:grid-cols-2 gap-4 sm:gap-5">
              {Object.values(SERIES).map((s) => {
                const count    = VIDEOS.filter((v) => v.series === s.code).length;
                const isActive = activeSeries === s.code;
                return (
                  <button key={s.code}
                          onClick={() => {
                            setActiveSeries(isActive ? "ALL" : s.code);
                            document.getElementById("library")?.scrollIntoView({ behavior: "smooth" });
                          }}
                          className={`text-left p-6 sm:p-7 rounded-2xl border transition-all relative overflow-hidden group
                            ${isActive ? "bg-stone-900 text-white border-stone-900" : "bg-white border-stone-200 hover:border-[#c2410c] hover:shadow-md"}`}>
                    <div className="absolute -top-1 -right-1 w-24 h-24 rounded-full opacity-10 group-hover:opacity-20 transition"
                         style={{ background: s.color }} />
                    <div className="flex items-start justify-between gap-4 mb-4">
                      <div>
                        <div className={`text-[10px] font-mono tracking-widest mb-2 ${isActive ? "text-stone-400" : "text-stone-400"}`}>
                          SERIES · {s.code}
                        </div>
                        <h3 className="font-serif text-xl sm:text-2xl font-medium leading-tight">{s.title}</h3>
                      </div>
                      <span className="font-serif text-3xl sm:text-4xl font-medium tabular-nums shrink-0"
                            style={{ color: isActive ? "#fff" : s.color }}>
                        {count}
                      </span>
                    </div>
                    <div className={`text-xs flex items-center gap-1.5 mb-3 ${isActive ? "text-stone-300" : "text-stone-500"}`}>
                      <IconUser size={12} /> {s.teacher}
                    </div>
                    <p className={`text-sm leading-relaxed ${isActive ? "text-stone-300" : "text-stone-600"}`}>{s.blurb}</p>
                    <div className={`mt-5 inline-flex items-center gap-1 text-xs font-medium ${isActive ? "text-[#fb923c]" : "text-[#c2410c]"}`}>
                      {isActive ? "已筛选 — 点击取消" : "查看课程"} <IconChevron size={13} />
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        </section>

        {/* ============ 课程库 ============ */}
        <section id="library" ref={filterRef}
                 className={`bg-white border-y border-stone-200/80 reveal ${filterSeen ? "reveal-on" : ""}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
            <div className="flex items-end justify-between flex-wrap gap-4 mb-8">
              <div>
                <div className="text-[11px] tracking-[0.3em] text-[#c2410c] font-medium uppercase mb-3">
                  · 0{showPath ? 4 : 3} / Course Library ·
                </div>
                <h2 className="font-serif text-3xl sm:text-5xl font-medium">课程库</h2>
              </div>
              <div className="text-sm text-stone-500 tabular-nums">
                显示 <strong className="text-stone-900">{filtered.length}</strong> / {VIDEOS.length} 个视频
              </div>
            </div>

            <div className="space-y-4 mb-10">
              <div className="relative max-w-md">
                <span className="absolute left-4 top-1/2 -translate-y-1/2 text-stone-400">
                  <IconSearch size={16}/>
                </span>
                <input
                  type="text"
                  value={search}
                  onChange={(e) => setSearch(e.target.value)}
                  placeholder="搜索：和弦、调音、指弹、讲师名字…"
                  className="w-full pl-11 pr-4 py-3 bg-stone-50 border border-stone-200 rounded-full text-sm focus:outline-none focus:border-[#c2410c] focus:bg-white transition"
                />
              </div>

              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-stone-500 mr-1 inline-flex items-center gap-1.5">
                  <IconFilter size={12} /> 难度：
                </span>
                <button
                  onClick={() => setActiveLevel("ALL")}
                  className={`text-xs px-3.5 py-1.5 rounded-full transition border
                    ${activeLevel === "ALL"
                      ? "bg-stone-900 text-white border-stone-900"
                      : "bg-white text-stone-700 border-stone-200 hover:border-stone-400"}`}>
                  全部
                </button>
                {Object.entries(LEVELS).map(([k, v]) => {
                  const isActive = activeLevel === parseInt(k);
                  return (
                    <button key={k}
                            onClick={() => setActiveLevel(isActive ? "ALL" : parseInt(k))}
                            className={`text-xs px-3.5 py-1.5 rounded-full transition border inline-flex items-center gap-1.5
                              ${isActive ? "text-white border-transparent" : "bg-white text-stone-700 border-stone-200 hover:border-stone-400"}`}
                            style={isActive ? { background: v.hex } : {}}>
                      <span className="w-1.5 h-1.5 rounded-full" style={{ background: isActive ? "white" : v.hex }} />
                      {v.label}
                      <span className="text-[10px] opacity-70 hidden sm:inline">· {v.desc}</span>
                    </button>
                  );
                })}
              </div>

              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-stone-500 mr-1">系列：</span>
                <button
                  onClick={() => setActiveSeries("ALL")}
                  className={`text-xs px-3.5 py-1.5 rounded-full transition border
                    ${activeSeries === "ALL"
                      ? "bg-stone-900 text-white border-stone-900"
                      : "bg-white text-stone-700 border-stone-200 hover:border-stone-400"}`}>
                  全部
                </button>
                {Object.values(SERIES).map((s) => {
                  const isActive = activeSeries === s.code;
                  return (
                    <button key={s.code}
                            onClick={() => setActiveSeries(isActive ? "ALL" : s.code)}
                            className={`text-xs px-3.5 py-1.5 rounded-full transition border
                              ${isActive ? "text-white border-transparent" : "bg-white text-stone-700 border-stone-200 hover:border-stone-400"}`}
                            style={isActive ? { background: s.color } : {}}>
                      {s.code} · {s.teacher.split("（")[0].slice(0, 8)}
                    </button>
                  );
                })}
              </div>
            </div>

            {filtered.length === 0 ? (
              <div className="text-center py-20 text-stone-500">
                <p className="font-serif text-2xl mb-2">没有匹配的视频</p>
                <p className="text-sm">试试改变筛选条件，或清空搜索框</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-5">
                {filtered.map((v, i) => (
                  <VideoCard key={v.id} video={v} onPlay={setPlaying} index={i} />
                ))}
              </div>
            )}
          </div>
        </section>

        {/* ============ DARK CTA ============ */}
        <section ref={ctaRef} className={`reveal ${ctaSeen ? "reveal-on" : ""}`}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-16 sm:py-24">
            <div className="bg-stone-900 text-stone-100 rounded-3xl p-8 sm:p-14 relative overflow-hidden grain">
              <div className="absolute -top-32 -right-32 w-80 h-80 rounded-full bg-[#c2410c]/20 blur-3xl" />
              <div className="absolute -bottom-32 -left-32 w-80 h-80 rounded-full bg-[#c2410c]/10 blur-3xl" />
              <div className="relative max-w-3xl">
                <div className="text-[11px] tracking-[0.3em] text-[#fb923c] font-medium uppercase mb-4">
                  · Ready to play? ·
                </div>
                <h2 className="font-serif text-3xl sm:text-5xl font-medium leading-tight mb-5">
                  视频看完了，<br/>
                  该<span className="italic text-[#fb923c]">入手一把琴</span>了。
                </h2>
                <p className="text-stone-400 mb-8 text-base sm:text-lg leading-relaxed">
                  我们在马来西亚精选了适合各等级的尤克里里 — 从入门琴到值得收藏的单板琴。
                  全马送货、原厂质保。
                </p>
                <div className="flex flex-wrap gap-3">
                  <a href="https://www.ukulelemalaysia.com/2330-series"
                     className="inline-flex items-center gap-2 bg-[#c2410c] hover:bg-[#fb923c] text-white px-7 py-3.5 rounded-full text-sm font-medium transition shadow-lg hover:shadow-xl group">
                    选购 Ukunili 2330 系列
                    <IconChevron size={16} className="group-hover:translate-x-0.5 transition" />
                  </a>
                  <a href="https://www.ukulelemalaysia.com/how-to-buy-ukulele"
                     className="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 backdrop-blur text-white border border-white/20 px-7 py-3.5 rounded-full text-sm font-medium transition">
                    先看选购指南
                  </a>
                </div>
                <p className="text-xs text-stone-500 mt-8 italic">
                  #学乐器没有一步登天只有不断练习
                </p>
              </div>
            </div>
          </div>
        </section>

        <footer className="border-t border-stone-200/80">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 py-8 flex flex-wrap justify-between items-center gap-3 text-xs text-stone-500">
            <div>© Ukulele Malaysia · Learning Center</div>
            <div className="flex items-center gap-4">
              <span>所有视频版权归原作者所有</span>
              <span className="hidden sm:inline">·</span>
              <a href="#top" className="hover:text-[#c2410c] transition">回到顶部 ↑</a>
            </div>
          </div>
        </footer>
      </main>

      <VideoModal video={playing} onClose={() => setPlaying(null)} />
    </div>
  );
}

// ============================================================
// 挂载
// ============================================================
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

// 隐藏 loader
requestAnimationFrame(() => {
  const boot = document.getElementById("boot");
  if (boot) {
    boot.classList.add("gone");
    setTimeout(() => boot.remove(), 500);
  }
});
</script>

</body>
</html>
